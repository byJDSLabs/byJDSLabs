<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20">
  <defs>
    <style>
      .bg { fill: #0a0a0c; }
      .line-base { stroke: #262930; stroke-width: 2; }
      .line-yellow { stroke: #f4b302; stroke-width: 2; }
      .line-white { stroke: #e6e7e8; stroke-width: 2; }
      .accent-yellow { fill: #f4b302; }
      .accent-white { fill: #e6e7e8; }
      .accent-gray { fill: #262930; }
    </style>
  </defs>
  
  <!-- Fondo oscuro -->
  <rect width="100%" height="100%" fill="none" rx="3"/>

  <!-- Línea base conectora -->
  <line class="line-base" x1="20" y1="10" x2="980" y2="10" />

  <!-- Nodos y conexiones amarillas (Izquierda) -->
  <line class="line-yellow" x1="100" y1="10" x2="250" y2="10" />
  <circle cx="100" cy="10" r="4" fill="#0a0a0c" stroke="#f4b302" stroke-width="2" />
  <circle cx="250" cy="10" r="3" class="accent-yellow" />

  <!-- Símbolo abstracto de código </ > -->
  <path d="M 340 6 L 336 10 L 340 14" fill="none" stroke="#e6e7e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="345" y1="15" x2="351" y2="5" stroke="#262930" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 356 6 L 360 10 L 356 14" fill="none" stroke="#e6e7e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mini barra de progreso estilo UI -->
  <rect x="460" y="8" width="80" height="4" class="accent-gray" rx="2" />
  <rect x="460" y="8" width="35" height="4" class="accent-yellow" rx="2" />

  <!-- Nodos y conexiones blancas/grises (Derecha) -->
  <line class="line-white" x1="650" y1="10" x2="800" y2="10" />
  <rect x="647" y="7" width="6" height="6" class="accent-white" rx="1" />
  <circle cx="800" cy="10" r="4" fill="#0a0a0c" stroke="#e6e7e8" stroke-width="2" />

  <!-- Puntos decorativos (estilo circuito/dashboard) -->
  <circle cx="40" cy="10" r="1.5" class="accent-gray" />
  <circle cx="60" cy="10" r="1.5" class="accent-gray" />
  
  <circle cx="880" cy="10" r="1.5" class="accent-yellow" />
  <circle cx="900" cy="10" r="1.5" class="accent-yellow" />
  <circle cx="920" cy="10" r="1.5" class="accent-yellow" />

  <!-- Pequeño acento final -->
  <line class="line-yellow" x1="950" y1="10" x2="965" y2="10" />
</svg>
